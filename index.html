<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart To-Do Tracker</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header class="hero">

<div class="overlay">

<h1>Smart To-Do List</h1>

<p>Track Your Daily Goals</p>

<div id="datetime"></div>

</div>

</header>

<section class="task-section">

<h2>Add Task</h2>

<input
type="text"
id="taskInput"
placeholder="Enter Task">

<input
type="datetime-local"
id="taskDate">

<button onclick="addTask()">

Add Task

</button>

</section>

<section class="filters">

<button onclick="showTasks('all')">

All

</button>

<button onclick="showTasks('daily')">

Daily

</button>

<button onclick="showTasks('weekly')">

Weekly

</button>

<button onclick="showTasks('monthly')">

Monthly

</button>

</section>

<section>

<ul id="taskList">

</ul>

</section>

<section class="dashboard">

<h2>Progress Dashboard</h2>

<div class="cards">

<div class="card">

<h3>Total</h3>

<p id="totalTasks">

0

</p>

</div>

<div class="card">

<h3>Completed</h3>

<p id="completedTasks">

0

</p>

</div>

<div class="card">

<h3>Pending</h3>

<p id="pendingTasks">

0

</p>

</div>

</div>

<canvas id="progressChart">

</canvas>

</section>

<section class="achievement">

<h2>Achievements</h2>

<div id="badgeArea">

No Badge Yet

</div>

</section>

<button id="themeToggle">

Dark Mode

</button>

<script src="script.js"></script>

</body>

</html>
